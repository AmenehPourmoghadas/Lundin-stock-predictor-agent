name: Collect Market Data

on:
  workflow_dispatch:

  schedule:
    # GitHub cron uses UTC.
    # A delayed scheduled run still executes the complete workflow.
    - cron: "0 8 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: collect-market-data
  cancel-in-progress: false

jobs:
  collect-market-data:
    name: Collect market data and send chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies and project
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Verify Python installation
        shell: bash
        run: |
          set -euo pipefail

          python --version
          python -m pip --version
          python -m pip show lundin-agent

          python - <<'PY'
          import sys

          import lundin_agent
          from lundin_agent.whatsapp import send_callmebot

          print("Python executable:", sys.executable)
          print("lundin_agent location:", lundin_agent.__file__)
          print("WhatsApp function:", send_callmebot.__name__)
          print("Project package installation verified.")
          PY

      - name: Prepare data directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data

      - name: Collect market data and generate chart
        shell: bash
        run: |
          set -euo pipefail
          python scripts/collect_market_data.py

      - name: Commit and push generated data files
        id: commit_files
        shell: bash
        run: |
          set -euo pipefail

          # Editable installation may modify tracked package metadata.
          # Restore it so only files under data/ are considered.
          git restore --worktree -- src/lundin_agent.egg-info 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage every file change under data/, regardless of name or format.
          git add -A data/

          echo "Generated data changes:"
          git status --short -- data/

          # If the collection step created or changed nothing, skip the commit
          # and continue with the remaining workflow steps.
          if git diff --cached --quiet -- data/; then
            echo "No generated data changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "chart_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture a PNG changed during this run, if one exists.
          # This supports timestamped chart filenames.
          chart_path="$(
            git diff --cached --name-only --diff-filter=ACMRT -- data/ |
              awk 'tolower($0) ~ /\.png$/ { path=$0 } END { print path }'
          )"

          echo "chart_path=${chart_path}" >> "$GITHUB_OUTPUT"

          git commit             -m "Market data collection $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push origin HEAD:main

          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Validate WhatsApp configuration
        if: steps.commit_files.outputs.chart_path != ''
        shell: bash
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${WHATSAPP_PHONE}" ]]; then
            echo "ERROR: WHATSAPP_PHONE GitHub secret is missing."
            exit 1
          fi

          if [[ -z "${CALLMEBOT_API_KEY}" ]]; then
            echo "ERROR: CALLMEBOT_API_KEY GitHub secret is missing."
            exit 1
          fi

          echo "WhatsApp secrets are configured."

      - name: Send chart link by WhatsApp
        if: steps.commit_files.outputs.chart_path != ''
        shell: bash
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
          CHART_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/${{ steps.commit_files.outputs.chart_path }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os

          from lundin_agent.whatsapp import send_callmebot

          phone = os.environ["WHATSAPP_PHONE"]
          api_key = os.environ["CALLMEBOT_API_KEY"]
          chart_url = os.environ["CHART_URL"]

          message = (
              "Lundin market chart:\n"
              f"{chart_url}"
          )

          response = send_callmebot(
              message=message,
              phone=phone,
              api_key=api_key,
          )

          print("WhatsApp message sent successfully.")
          print(response)
          PY