name: Collect News Data

on:
  workflow_dispatch:

  schedule:
    # GitHub cron uses UTC.
    # Run at both possible UTC times, then verify Stockholm local time 9Am.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"

permissions:
  contents: read

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check Stockholm execution time
        id: schedule_check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual workflow execution requested."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          stockholm_hour="$(TZ=Europe/Stockholm date +'%H')"

          echo "Current Stockholm hour: ${stockholm_hour}"

          if [[ "${stockholm_hour}" == "09" ]]; then
            echo "It is 09:00 in Stockholm. Starting collectors."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "It is not 09:00 in Stockholm. Skipping this scheduled execution."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.schedule_check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        if: steps.schedule_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Google News collector
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python scripts/collect_google_news.py

      - name: Run GDELT collector
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python scripts/collect_gdelt.py

      - name: Run Lundin Official collector
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python scripts/collect_lundin_official.py

      - name: Show generated files
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          mkdir -p data
          ls -lah data

      - name: Upload collected news data
        if: steps.schedule_check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: collected-news-${{ github.run_number }}
          path: data/*.json
          if-no-files-found: warn
          retention-days: 30