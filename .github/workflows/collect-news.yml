name: Collect News Data

on:
  workflow_dispatch:

  schedule:
    # GitHub schedules use UTC.
    # Sweden is UTC+2 in summer and UTC+1 in winter.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"

permissions:
  contents: write

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check Stockholm execution time
        id: schedule_check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual workflow execution requested."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          stockholm_hour="$(TZ=Europe/Stockholm date +'%H')"

          echo "Current Stockholm hour: ${stockholm_hour}"

          if [[ "${stockholm_hour}" == "09" ]]; then
            echo "It is 09:00 in Stockholm. Starting collectors."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "It is not 09:00 in Stockholm. Skipping this execution."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.schedule_check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        if: steps.schedule_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Google News collector
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python scripts/collect_google_news.py

      - name: Run GDELT collector
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python scripts/collect_gdelt.py

      - name: Run Lundin Official collector
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          python scripts/collect_lundin_official.py

      - name: Show generated files
        if: steps.schedule_check.outputs.should_run == 'true'
        run: |
          mkdir -p data
          echo "Generated files:"
          find data -maxdepth 1 -type f -name "*.json" -print
          ls -lah data

      - name: Commit generated JSON files
        if: steps.schedule_check.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --force data/*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new JSON files were created."
            exit 0
          fi

          git commit -m "Daily news collection $(date -u +'%Y-%m-%d %H:%M UTC')"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"