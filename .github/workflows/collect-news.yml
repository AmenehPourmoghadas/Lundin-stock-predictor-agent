name: Collect News Data

on:
  workflow_dispatch:

  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect-news:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Google News collector
        run: |
          python scripts/collect_google_news.py

      - name: Run GDELT collector
        run: |
          python scripts/collect_gdelt.py

      - name: Run Lundin Official collector
        run: |
          python scripts/collect_lundin_official.py

      - name: Show generated files
        run: |
          mkdir -p data
          ls -lah data || true

      - name: Commit generated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No new JSON files created."
            exit 0
          fi

          git commit -m "Daily news collection $(date -u +'%Y-%m-%d %H:%M UTC')"

          git pull --rebase origin ${GITHUB_REF_NAME}

          git push origin HEAD:${GITHUB_REF_NAME}
