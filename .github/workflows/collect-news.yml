name: Collect News Data

on:
  workflow_dispatch:

  schedule:
    # GitHub cron uses UTC.
    # A delayed scheduled run still executes the complete workflow.
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies and project
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Prepare data directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data

      - name: Run Google News collector
        id: google_news
        shell: bash
        run: |
          set +e

          before_count="$(
            find data               -maxdepth 1               -type f               -name 'google_news_*.json'               | wc -l
          )"

          python scripts/collect_google_news.py
          exit_code=$?

          after_count="$(
            find data               -maxdepth 1               -type f               -name 'google_news_*.json'               | wc -l
          )"

          created_count=$((after_count - before_count))

          if [[ "${exit_code}" -ne 0 ]]; then
            status="failed"
          elif [[ "${created_count}" -gt 0 ]]; then
            status="created"
          else
            status="skipped"
          fi

          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "created=${created_count}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

          echo "Google News status: ${status}"
          echo "Google News files created: ${created_count}"
          echo "Google News exit code: ${exit_code}"

          # A collector failure must not stop the remaining collectors.
          exit 0

      - name: Run GDELT collector
        id: gdelt
        shell: bash
        run: |
          set +e

          before_count="$(
            find data               -maxdepth 1               -type f               -name 'gdelt_*.json'               | wc -l
          )"

          python scripts/collect_gdelt.py
          exit_code=$?

          after_count="$(
            find data               -maxdepth 1               -type f               -name 'gdelt_*.json'               | wc -l
          )"

          created_count=$((after_count - before_count))

          if [[ "${exit_code}" -ne 0 ]]; then
            status="failed"
          elif [[ "${created_count}" -gt 0 ]]; then
            status="created"
          else
            status="skipped"
          fi

          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "created=${created_count}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

          echo "GDELT status: ${status}"
          echo "GDELT files created: ${created_count}"
          echo "GDELT exit code: ${exit_code}"

          # A collector failure must not stop the remaining collectors.
          exit 0

      - name: Run Lundin Official collector
        id: lundin_official
        shell: bash
        run: |
          set +e

          before_count="$(
            find data               -maxdepth 1               -type f               -name 'lundin_official_*.json'               | wc -l
          )"

          python scripts/collect_lundin_official.py
          exit_code=$?

          after_count="$(
            find data               -maxdepth 1               -type f               -name 'lundin_official_*.json'               | wc -l
          )"

          created_count=$((after_count - before_count))

          if [[ "${exit_code}" -ne 0 ]]; then
            status="failed"
          elif [[ "${created_count}" -gt 0 ]]; then
            status="created"
          else
            status="skipped"
          fi

          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "created=${created_count}" >> "$GITHUB_OUTPUT"
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

          echo "Lundin Official status: ${status}"
          echo "Lundin Official files created: ${created_count}"
          echo "Lundin Official exit code: ${exit_code}"

          # A collector failure must not stop the remaining collectors.
          exit 0

      - name: Verify newly generated JSON files
        id: verification
        shell: bash
        run: |
          set -euo pipefail

          invalid_count=0
          valid_count=0

          echo "Checking recently generated JSON files..."

          while IFS= read -r file; do
            echo "Checking: ${file}"

            if [[ ! -s "${file}" ]]; then
              echo "ERROR: ${file} is empty."
              invalid_count=$((invalid_count + 1))
              rm -f "${file}"
              continue
            fi

            if ! python -m json.tool "${file}" > /dev/null; then
              echo "ERROR: ${file} contains invalid JSON."
              invalid_count=$((invalid_count + 1))
              rm -f "${file}"
              continue
            fi

            echo "VALID: ${file}"
            valid_count=$((valid_count + 1))
          done < <(
            find data               -maxdepth 1               -type f               -name "*.json"               -mmin -60               -print
          )

          echo "valid_count=${valid_count}" >> "$GITHUB_OUTPUT"
          echo "invalid_count=${invalid_count}" >> "$GITHUB_OUTPUT"

          echo "Valid recently generated files: ${valid_count}"
          echo "Invalid files removed: ${invalid_count}"

      - name: Show repository data directory
        shell: bash
        run: |
          set -euo pipefail

          echo "Current JSON files under data/:"
          find data             -maxdepth 1             -type f             -name "*.json"             -print

          echo ""
          ls -lah data

      - name: Commit generated JSON files
        id: commit_files
        shell: bash
        run: |
          set -euo pipefail

          # Editable installation may modify tracked package metadata.
          # Restore it so only generated data files are committed.
          git restore --worktree -- src/lundin_agent.egg-info 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email             "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json 2>/dev/null || true

          echo "Git status:"
          git status --short

          if git diff --cached --quiet; then
            echo "No valid JSON files need to be committed."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit             -m "Daily news collection $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push origin HEAD:main

          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "Generated JSON files were pushed to data/."