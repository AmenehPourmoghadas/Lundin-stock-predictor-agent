name: Test External Access

on:
  workflow_dispatch:

jobs:
  test-external-access:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Test GitHub API
        run: |
          python - <<'PY'
          import requests

          url = "https://api.github.com"

          response = requests.get(
              url,
              timeout=20,
          )

          print("URL:", url)
          print("Status:", response.status_code)

          response.raise_for_status()
          PY

      - name: Test Lundin Mining Google News RSS
        run: |
          python - <<'PY'
          import feedparser

          url = (
              "https://news.google.com/rss/search"
              "?q=Lundin+Mining"
          )

          feed = feedparser.parse(url)

          print("URL:", url)
          print("Entries:", len(feed.entries))

          if feed.bozo:
              print(
                  "Feed parsing warning:",
                  feed.bozo_exception,
              )

          if not feed.entries:
              raise RuntimeError(
                  "Lundin Mining RSS returned no entries"
              )

          for entry in feed.entries[:5]:
              print("-", entry.get("title"))
          PY

      - name: Test Copper News RSS
        run: |
          python - <<'PY'
          import feedparser

          url = (
              "https://news.google.com/rss/search"
              "?q=copper+price+mining"
          )

          feed = feedparser.parse(url)

          print("URL:", url)
          print("Entries:", len(feed.entries))

          if feed.bozo:
              print(
                  "Feed parsing warning:",
                  feed.bozo_exception,
              )

          if not feed.entries:
              raise RuntimeError(
                  "Copper news RSS returned no entries"
              )

          for entry in feed.entries[:5]:
              print("-", entry.get("title"))
          PY

      - name: Test Chile Mining RSS
        run: |
          python - <<'PY'
          import feedparser

          url = (
              "https://news.google.com/rss/search"
              "?q=Chile+copper+mining"
          )

          feed = feedparser.parse(url)

          print("URL:", url)
          print("Entries:", len(feed.entries))

          if feed.bozo:
              print(
                  "Feed parsing warning:",
                  feed.bozo_exception,
              )

          if not feed.entries:
              raise RuntimeError(
                  "Chile mining RSS returned no entries"
              )

          for entry in feed.entries[:5]:
              print("-", entry.get("title"))
          PY
          
      - name: Test WhatsApp via CallMeBot
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
        run: |
          python - <<'PY'
          import os
          from lundin_agent.whatsapp import send_callmebot

          phone = os.environ["WHATSAPP_PHONE"]
          api_key = os.environ["CALLMEBOT_API_KEY"]

          message = (
              "Hello from GitHub Actions!\n"
              "This is a test message from the Lundin Agent repository."
          )

          response = send_callmebot(
              message=message,
              phone=phone,
              api_key=api_key,
          )

          print(response)
          PY          